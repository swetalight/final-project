

services:
  # ============================================================
  # KAFKA BROKER 1
  # ============================================================
  kafka1:
    image: apache/kafka:4.1.2
    hostname: kafka1
    container_name: kafka1
    ports:
      - "9093:9093"
      - "9092:9092"
    volumes:
      - ./kafka_cck1/kafka_jaas.conf:/opt/kafka/config/kafka_jaas.conf
      - ./kafka_cck1/data:/opt/kafka/data
      - ./kafka_cck1/ssl/kafka.keystore.pem:/etc/kafka/secrets/kafka.keystore.pem:ro
      - ./kafka_cck1/ssl/kafka.keystore.key:/etc/kafka/secrets/kafka.keystore.key:ro
      - ./kafka_cck1/ssl/CAs/kafka.truststore.pem:/etc/kafka/secrets/kafka.truststore.pem:ro
    environment:
      KAFKA_PORT: 9092
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_BROKER_ID: 1001
      KAFKA_NODE_ID: 1001
      CLUSTER_ID: 1tpzF-k0TC-r2Jubpi8fig
      KAFKA_LOG_DIRS: /opt/kafka/data
      KAFKA_BROKER_ID_GENERATION_ENABLE: "False"
      KAFKA_ADVERTISED_HOST_NAME: kafka1
      KAFKA_LISTENERS: INTER_BROKER://:9092,CONTROLLER://:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:SASL_SSL,INTER_BROKER:SASL_SSL
      KAFKA_ADVERTISED_LISTENERS: INTER_BROKER://kafka1:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTER_BROKER
      KAFKA_SSL_KEYSTORE_TYPE: PEM
      KAFKA_SSL_TRUSTSTORE_TYPE: PEM
      KAFKA_SSL_TRUSTSTORE_LOCATION: /etc/kafka/secrets/kafka.truststore.pem
      KAFKA_SSL_KEYSTORE_LOCATION: /etc/kafka/secrets/kafka.keystore.pem
      KAFKA_SASL_ENABLED_MECHANISMS: PLAIN,SCRAM-SHA-256,SCRAM-SHA-512
      KAFKA_LISTENER_NAME_CONTROLLER_SASL_ENABLED_MECHANISMS: PLAIN
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAIN
      KAFKA_SASL_MECHANISM_CONTROLLER_PROTOCOL: PLAIN
      KAFKA_OPTS: -Djava.security.auth.login.config=/opt/kafka/config/kafka_jaas.conf
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1001@kafka1:9093,1002@kafka2:9093,1003@kafka3:9093
      KAFKA_AUTHORIZER_CLASS_NAME: org.apache.kafka.metadata.authorizer.StandardAuthorizer
      KAFKA_ALLOW_EVERYONE_IF_NO_ACL_FOUND: "false"
      KAFKA_SUPER_USERS: "User:admin"
      KAFKA_DEFAULT_REPLICATION_FACTOR: 2
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
    networks:
      - kafka-net

