  mirror-maker:
    image: apache/kafka:4.1.2
    container_name: mirror-maker
    depends_on:
      - kafka1
      - kafka2
      - kafka3
      - kafka4
      - kafka5
      - kafka6
    volumes:
      - ./mirror-maker.properties:/opt/kafka/config/mirror-maker.properties
      - ./kafka_cck1/ssl/CAs/kafka.truststore.pem:/etc/kafka/secrets/truststore.pem:ro
      - ./kafka_cck1/ssl/kafka.keystore.pem:/etc/kafka/secrets/keystore.pem:ro
      - ./kafka_cck1/ssl/kafka.keystore.key:/etc/kafka/secrets/keystore.key:ro
      - ./kafka_cck4/ssl/CAs/kafka.truststore.pem:/etc/kafka/secrets/truststore-mirror.pem:ro
      - ./kafka_cck4/ssl/kafka.keystore.pem:/etc/kafka/secrets/keystore-mirror.pem:ro
      - ./kafka_cck4/ssl/kafka.keystore.key:/etc/kafka/secrets/keystore-mirror.key:ro
    entrypoint: >
      /bin/bash -c "
      echo '⏳ Ожидание запуска Kafka...' &&
      sleep 60 &&
      /opt/kafka/bin/connect-mirror-maker.sh /opt/kafka/config/mirror-maker.properties
      "
    networks:
      - kafka-net

  # ============================================================
