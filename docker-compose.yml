  kafbat-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    container_name: kafbat-ui
    ports:
      - "8080:8080"
    environment:
      SPRING_CONFIG_ADDITIONAL_LOCATION: /config-ui.yml
      SERVER_SERVLET_CONTEXT_PATH: /kafka_ui/
    volumes:
      - ./kafkaui.yml:/config-ui.yml
      - ./kafka_cck1/ssl/CAs/kafka.truststore.pem:/kafka/ssl/kafka.truststore.pem:ro
      - ./kafka_cck1/ssl/kafka.keystore.pem:/kafka/ssl/kafka.keystore.pem:ro
      - ./kafka_cck1/ssl/kafka.keystore.key:/kafka/ssl/kafka.keystore.key:ro
    networks:
      - kafka-net

  # ============================================================
  # KAFKA INIT
  # ============================================================
  kafka-init:
    image: apache/kafka:4.1.2
    container_name: kafka-init
    depends_on:
      - kafka1
      - kafka2
      - kafka3
    volumes:
      - ./scripts:/scripts
      - ./kafka_cck1/ssl/CAs/kafka.truststore.pem:/etc/kafka/secrets/kafka.truststore.pem:ro
      - ./kafka_cck1/ssl/kafka.keystore.pem:/etc/kafka/secrets/kafka.keystore.pem:ro
      - ./kafka_cck1/ssl/kafka.keystore.key:/etc/kafka/secrets/kafka.keystore.key:ro
      - ./kafka_cck1/kafka_jaas.conf:/opt/kafka/config/kafka_jaas.conf
    entrypoint: ["bash", "/scripts/init-kafka.sh"]
    networks:
      - kafka-net

  # ============================================================
  # SCHEMA REGISTRY
  # ============================================================
  schema-registry:
    image: confluentinc/cp-schema-registry:latest
    container_name: schema-registry
    depends_on:
      - kafka1
      - kafka2
      - kafka3
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: SASL_SSL://kafka1:9093,SASL_SSL://kafka2:9093,SASL_SSL://kafka3:9093
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_SECURITY_PROTOCOL: SASL_SSL
      SCHEMA_REGISTRY_KAFKASTORE_SASL_MECHANISM: PLAIN
      SCHEMA_REGISTRY_KAFKASTORE_SASL_JAAS_CONFIG: org.apache.kafka.common.security.plain.PlainLoginModule required username="admin" password="uosieQu6ACie0eichoo5ohdeeWaepowa";
      SCHEMA_REGISTRY_KAFKASTORE_SSL_TRUSTSTORE_LOCATION: /etc/kafka/secrets/kafka.truststore.pem
      SCHEMA_REGISTRY_KAFKASTORE_SSL_TRUSTSTORE_TYPE: PEM
      SCHEMA_REGISTRY_KAFKASTORE_SSL_KEYSTORE_LOCATION: /etc/kafka/secrets/kafka.keystore.pem
      SCHEMA_REGISTRY_KAFKASTORE_SSL_KEYSTORE_TYPE: PEM
    volumes:
      - ./kafka_cck1/ssl:/etc/kafka/secrets
    networks:
      - kafka-net

  # ============================================================
  # ELASTICSEARCH
  # ============================================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - kafka-net

  # ============================================================
  # KIBANA
  # ============================================================
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: kibana
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - kafka-net

  # ============================================================
  # HDFS NAMENODE
  # ============================================================
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    hostname: namenode
    platform: linux/amd64
    ports:
      - "9870:9870"
      - "9000:9000" 
    environment:
      - CLUSTER_NAME=test
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - HDFS_CONF_dfs_replication=1
   
    volumes:
      - ./hadoop_data/namenode:/hadoop/dfs/name
    networks:
      - kafka-net

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    hostname: datanode
    platform: linux/amd64
    ports: []
    environment:
      - CLUSTER_NAME=test
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000

    volumes:
      - ./hadoop_data/datanode:/hadoop/dfs/data
    networks:
      - kafka-net
    depends_on:
      - namenode
volumes:
  es_data:

networks:
  kafka-net:
    driver: bridge